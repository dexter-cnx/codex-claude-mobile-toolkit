$schema: "https://json-schema.org/draft/2020-12/schema"
title: Toolkit Feature Status Entry
type: object
additionalProperties: false
required:
  - name
  - type
  - status
  - surfaces
  - path
  - purpose
properties:
  name:
    type: string
  type:
    type: string
    enum:
      - rule
      - prompt
      - skill
      - workflow
      - template
      - doc
      - memory
  status:
    type: string
    enum:
      - stable
      - experimental
      - internal
      - deprecated
  surfaces:
    type: array
    minItems: 1
    items:
      type: string
  path:
    type: string
  purpose:
    type: string
  inputs:
    type: string
  outputs:
    type: string
  dependencies:
    type: string
  verification_expectations:
    type: string
  fallback_path:
    type: string
  owner:
    type: string
  last_reviewed:
    type: string

